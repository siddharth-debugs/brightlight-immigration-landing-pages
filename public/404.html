<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Brightlight Immigration</title>
    <!--
      SPA redirect for GitHub Pages.
      Encodes the requested path into a query string, redirects to the
      app's index, where a tiny inline script decodes it back into the
      URL before React Router boots.
      Based on https://github.com/rafgraph/spa-github-pages (MIT).
    -->
    <script>
      // 1 because the site is served from /<repo>/, e.g.
      // siddharth-debugs.github.io/brightlight-immigration/...
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
