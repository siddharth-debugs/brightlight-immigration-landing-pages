    <script>
      // SPA redirect decoder for GitHub Pages — pairs with public/404.html.
      // If the URL is /?/some/path, rewrite to /some/path so React Router
      // sees the original deep link.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
